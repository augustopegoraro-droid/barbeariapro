# BarbeariaPro — APP stack (backend FastAPI + frontend Next 16)
#
# Compose SEPARADO da infra (postgres/n8n/evolution continuam no docker-compose.yml).
# Project name próprio (barbeariapro-app) → não colide com o project da infra.
#
# A infra (postgres :5432, evolution :8080) é alcançada pelos containers via
# host.docker.internal, pois já está publicada no host. NÃO redefinimos nem
# tocamos nesses serviços aqui.
#
# Uso:
#   docker compose -f docker-compose.app.yml config        # validar sintaxe
#   docker compose -f docker-compose.app.yml up -d --build  # subir só app
#   docker compose -f docker-compose.app.yml down           # derrubar só app

name: barbeariapro-app

services:

  # ──────────────────────────────────────────────────────────────
  # Redis — rate-limit/lockout/tickets SSE/denylist do backend (D-68, Fase 3)
  # Dedicado ao app (não compartilha com o evolution-redis do gateway WhatsApp).
  # Dado 100% efêmero (fonte de verdade de sessão é o Postgres) — sem volume,
  # sem porta publicada (só o backend deste compose o alcança, via nome do serviço).
  # ──────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: barbeariapro-app-redis
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ──────────────────────────────────────────────────────────────
  # Backend — FastAPI (uvicorn) :8000
  # ──────────────────────────────────────────────────────────────
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    image: barbeariapro-backend
    container_name: barbeariapro-app-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env          # config base da app (SECRET_KEY, BOT_*, etc.)
      - .env.docker   # overrides p/ container (DATABASE_URL → host.docker.internal)
    environment:
      # Redis é deste mesmo compose (nome do serviço resolve na rede do projeto);
      # não é o evolution-redis (isolado, outra rede/projeto).
      REDIS_URL: redis://redis:6379/0
    extra_hosts:
      # Resolve o host (onde postgres/evolution estão publicados)
      - "host.docker.internal:host-gateway"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0) if urllib.request.urlopen('http://localhost:8000/health',timeout=3).status==200 else sys.exit(1)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ──────────────────────────────────────────────────────────────
  # Frontend — Next 16 (next start) :3000
  # ──────────────────────────────────────────────────────────────
  frontend:
    build:
      context: ./barbearia-frontend
      dockerfile: Dockerfile
      args:
        # Inlinado no bundle do browser em tempo de build.
        # Em produção: definir NEXT_PUBLIC_API_URL=https://api.taylorethedy.com.br no .env
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_ORG_ID: ${NEXT_PUBLIC_ORG_ID:-3}
    image: barbeariapro-frontend
    container_name: barbeariapro-app-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env.docker   # API_URL_INTERNAL (SSR/next-auth), AUTH_SECRET, AUTH_TRUST_HOST
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3000/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────
  # Site público do cliente final (Next 16) :3200 — D-79
  # Servido no apex taylorethedy.com (server block dedicado no nginx).
  # Sobe no `up` padrão (é o site do cliente final, não ferramenta interna).
  # ──────────────────────────────────────────────────────────────
  public:
    build:
      context: ./barbearia-public
      dockerfile: Dockerfile
      args:
        # Inlinadas no bundle do browser em build.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL:-http://localhost:8000}
        NEXT_PUBLIC_TENANT_SLUG: ${PUBLIC_TENANT_SLUG:-taylor}
        NEXT_PUBLIC_SITE_URL: ${PUBLIC_SITE_URL:-https://taylorethedy.com}
    image: barbeariapro-public
    container_name: barbeariapro-app-public
    restart: unless-stopped
    ports:
      - "3200:3200"
    environment:
      # SSR/ISR da home fala com o backend pela rede interna do compose.
      API_URL_INTERNAL: http://backend:8000
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3200/"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ──────────────────────────────────────────────────────────────
  # Superadmin — Painel de Plataforma (Next 16) :3100
  #
  # Repo SEPARADO: augustopegoraro-droid/barbearia-superadmin. Precisa estar
  # presente em ./barbearia-superadmin (submódulo ou `git clone` na VM).
  #
  # Sob profile "superadmin" → NÃO sobe no `up` padrão. Só quando ativado:
  #   docker compose -f docker-compose.app.yml --profile superadmin up -d --build superadmin
  #
  # Requer .env.superadmin (ver .env.superadmin.example). Deploy só depois do
  # domínio: DNS admin.taylorethedy.com + server block no nginx + HTTPS.
  # ──────────────────────────────────────────────────────────────
  superadmin:
    profiles: ["superadmin"]
    build:
      context: ./barbearia-superadmin
      dockerfile: Dockerfile
      args:
        # Inlinada no bundle do browser em build. Em prod: URL pública do backend.
        NEXT_PUBLIC_API_URL: ${SUPERADMIN_API_URL:-http://localhost:8000}
    image: barbeariapro-superadmin
    container_name: barbeariapro-app-superadmin
    restart: unless-stopped
    ports:
      - "3100:3100"
    env_file:
      - .env.superadmin   # API_URL_INTERNAL (SSR/next-auth), AUTH_SECRET, AUTH_TRUST_HOST
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost:3100/login"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
