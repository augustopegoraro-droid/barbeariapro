# ============================================================================
# Alembic — configuração principal (BarbeariaPro)
# ============================================================================
# A URL de conexão é resolvida em alembic/env.py a partir da variável de
# ambiente DATABASE_URL (com fallback para o valor abaixo). Mantenha
# credenciais fora deste arquivo em produção.
# ============================================================================

[alembic]
script_location = alembic
prepend_sys_path = .
path_separator = os

# Fallback usado apenas se DATABASE_URL não estiver definida no ambiente.
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:5432/barbeariapro

[post_write_hooks]
# (opcional) formatação automática das migrations geradas; desativado por padrão.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
