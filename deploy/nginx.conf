# BarbeariaPro — Nginx reverse proxy
# /etc/nginx/sites-available/barbeariapro
#
# ANTES DE USAR: copiar para o VM e rodar certbot (setup-vm.sh faz isso).
# certbot --nginx -d taylorethedy.app -d api.taylorethedy.com --redirect
# vai adicionar os blocos SSL e o redirect HTTP→HTTPS automaticamente.

# ── Frontend (Next.js) ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name taylorethedy.app;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Backend (FastAPI) ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.taylorethedy.com;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Superadmin — Painel de Plataforma (Next.js :3100) ──────────────────────────
# App SEPARADO do frontend de tenant (D-55). Só ativar após comprar o domínio:
#   1) DNS: A record admin.taylorethedy.com → IP da VM
#   2) subir o container: docker compose -f docker-compose.app.yml \
#        --profile superadmin up -d --build superadmin
#   3) HTTPS: certbot --nginx -d admin.taylorethedy.com --redirect
server {
    listen 80;
    server_name admin.taylorethedy.com;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
