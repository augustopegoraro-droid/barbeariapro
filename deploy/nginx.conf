# BarbeariaPro — Nginx reverse proxy
# /etc/nginx/sites-available/barbeariapro
#
# NOTA (D-68): este é o arquivo-fonte de referência do repo. Antes de aplicar
# os headers de segurança abaixo em produção, confirme a config REALMENTE
# ativa na VM (`sudo nginx -T`) — PROJECT_CONTEXT.md registra que ela pode ter
# divergido deste arquivo (ex.: histórico sem HTTPS antes do D-64).
#
# Certificado TLS coringa (Let's Encrypt, validação DNS-01 via Cloudflare)
# cobre taylorethedy.com + *.taylorethedy.com — emitido fora deste arquivo
# (certbot via snap, não apt — ver DECISIONS.md D-54/domínio):
#   certbot certonly --dns-cloudflare \
#     --dns-cloudflare-credentials /root/.secrets/certbot/cloudflare.ini \
#     -d taylorethedy.com -d "*.taylorethedy.com"

# ── Redireciona HTTP → HTTPS (todos os hosts) ─────────────────────────────────
server {
    listen 80;
    server_name taylorethedy.com *.taylorethedy.com;

    location / {
        return 301 https://$host$request_uri;
    }
}

# ── Site público do cliente final (Next.js :3200) — APEX (D-78/D-79) ─────────
server {
    listen 443 ssl http2;
    server_name taylorethedy.com;

    ssl_certificate     /etc/letsencrypt/live/taylorethedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taylorethedy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 5m;

    location / {
        proxy_pass         http://localhost:3200;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Transição D-78: taylor. → app. (favoritos da equipe) ─────────────────────
server {
    listen 443 ssl http2;
    server_name taylor.taylorethedy.com;

    ssl_certificate     /etc/letsencrypt/live/taylorethedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taylorethedy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://app.taylorethedy.com$request_uri;
}

# ── Frontend de tenant (Next.js :3000) — subdomínios (D-54/D-78: app. etc.) ──
# apex, taylor., admin. e api. têm bloco próprio; nginx sempre prioriza
# server_name exato sobre coringa, então nunca caem aqui por engano.
server {
    listen 443 ssl http2;
    server_name *.taylorethedy.com;

    ssl_certificate     /etc/letsencrypt/live/taylorethedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taylorethedy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Cabeçalhos de segurança (V12, D-68) — defesa em profundidade. Sem CSP aqui:
    # o Next.js do frontend tenant precisa de scripts/estilos próprios; um CSP
    # genérico quebraria a app. CSP real fica só na API (FastAPI já envia, ver
    # app/core/security_headers.py) — o frontend não renderiza dado de terceiro.
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Backend (FastAPI :8000) ────────────────────────────────────────────────────
server {
    listen 443 ssl http2;
    server_name api.taylorethedy.com;

    ssl_certificate     /etc/letsencrypt/live/taylorethedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taylorethedy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Defesa em profundidade — a API já envia estes (+ CSP) via middleware
    # (app/core/security_headers.py); repetir aqui não conflita (mesmos valores).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

# ── Superadmin — Painel de Plataforma (Next.js :3100) (D-55) ──────────────────
# Container sobe só sob demanda:
#   docker compose -f docker-compose.app.yml --profile superadmin up -d --build superadmin
server {
    listen 443 ssl http2;
    server_name admin.taylorethedy.com;

    ssl_certificate     /etc/letsencrypt/live/taylorethedy.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/taylorethedy.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # Cabeçalhos de segurança (V12, D-68) — mesmo racional do bloco do frontend
    # tenant: sem CSP (Next.js precisa de scripts/estilos próprios).
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3100;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}
