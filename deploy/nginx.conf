# BarbeariaPro — Nginx reverse proxy
# /etc/nginx/sites-available/barbeariapro
#
# ANTES DE USAR: copiar para o VM e rodar certbot (setup-vm.sh faz isso).
# certbot --nginx -d app.taylorethedy.com.br -d api.taylorethedy.com.br --redirect
# vai adicionar os blocos SSL e o redirect HTTP→HTTPS automaticamente.

# ── Frontend (Next.js) ────────────────────────────────────────────────────────
server {
    listen 80;
    server_name app.taylorethedy.com.br;

    client_max_body_size 10m;

    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }
}

# ── Backend (FastAPI) ─────────────────────────────────────────────────────────
server {
    listen 80;
    server_name api.taylorethedy.com.br;

    client_max_body_size 20m;

    location / {
        proxy_pass         http://localhost:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}
